<div id="dashboard-stats" style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; padding: 20px; background: var(--admin-bg, #fff); border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
    <div style="flex: 1; min-width: 150px; padding: 15px; background: #e3f2fd; border-radius: 6px; text-align: center;">
        <h3 style="margin: 0; font-size: 28px; color: #1565c0;">{{ total_categories }}</h3>
        <p style="margin: 5px 0 0; color: #555; font-size: 12px;">Total Categories</p>
        <p style="margin: 2px 0 0; font-size: 11px; color: #888;">{{ active_categories }} active</p>
    </div>
    <div style="flex: 1; min-width: 150px; padding: 15px; background: #e8f5e9; border-radius: 6px; text-align: center;">
        <h3 style="margin: 0; font-size: 28px; color: #2e7d32;">{{ total_products }}</h3>
        <p style="margin: 5px 0 0; color: #555; font-size: 12px;">Total Products</p>
        <p style="margin: 2px 0 0; font-size: 11px; color: #888;">{{ active_products }} active</p>
    </div>
    <div style="flex: 1; min-width: 150px; padding: 15px; background: #fff3e0; border-radius: 6px; text-align: center;">
        <h3 style="margin: 0; font-size: 28px; color: #e65100;">{{ featured_products }}</h3>
        <p style="margin: 5px 0 0; color: #555; font-size: 12px;">Featured Products</p>
    </div>
    <div style="flex: 1; min-width: 150px; padding: 15px; background: #fce4ec; border-radius: 6px; text-align: center;">
        <h3 style="margin: 0; font-size: 28px; color: #c62828;">{{ out_of_stock }}</h3>
        <p style="margin: 5px 0 0; color: #555; font-size: 12px;">Out of Stock</p>
        <p style="margin: 2px 0 0; font-size: 11px; color: #888;">{{ low_stock }} low stock</p>
    </div>
    <div style="flex: 1; min-width: 150px; padding: 15px; background: #f3e5f5; border-radius: 6px; text-align: center;">
        <h3 style="margin: 0; font-size: 28px; color: #6a1b9a;">{{ total_variants }}</h3>
        <p style="margin: 5px 0 0; color: #555; font-size: 12px;">Product Variants</p>
    </div>
</div>
